  # payments/__init__.py
  # (no standalone functions defined)

  # payments/processor.py
  - file: "python/payments/processor.py"
    name: "PaymentProcessor"
    type: class

  - file: "python/payments/processor.py"
    name: "PaymentProcessor.__init__"
    type: method

  - file: "python/payments/processor.py"
    name: "PaymentProcessor.process"
    type: method

  - file: "python/payments/processor.py"
