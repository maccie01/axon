# Ground truth: every symbol that MUST exist in the graph after indexing.
# Format: file path relative to golden codebase root, symbol name, type.
# types: function, class, method, property

symbols:
  # auth/__init__.py -- re-exports only, no new symbols defined
  - file: "python/auth/__init__.py"
    name: "__init__"
    # no standalone functions defined here

  # auth/service.py
  - file: "python/auth/service.py"
    name: "Authenticator"
    type: class

  - file: "python/auth/service.py"
    name: "BaseAuth"
    type: class

  - file: "python/auth/service.py"
    name: "BaseAuth.authenticate"
    type: method

  - file: "python/auth/service.py"
